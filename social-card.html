<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashcam Social Card</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap");

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: #f5f9fc;
        color: #18212d;
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .card {
        position: relative;
        width: 1200px;
        height: 630px;
        padding: 58px 66px;
        display: grid;
        grid-template-columns: 0.95fr 1.05fr;
        gap: 48px;
        align-items: center;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(236, 244, 250, 0.92)),
          radial-gradient(circle at 82% 42%, rgba(23, 105, 232, 0.16), transparent 34%);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        color: #18212d;
        font-size: 30px;
        font-weight: 800;
      }

      .mark {
        width: 36px;
        height: 36px;
        display: inline-grid;
        place-items: center;
        border-radius: 10px;
        background: #18212d;
      }

      .mark span {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: #1769e8;
      }

      h1 {
        max-width: 520px;
        margin: 58px 0 0;
        font-size: 82px;
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        max-width: 500px;
        margin: 28px 0 0;
        color: #415066;
        font-size: 29px;
        line-height: 1.3;
      }

      .proof {
        margin-top: 36px;
        display: flex;
        gap: 14px;
        color: #0e4eb4;
        font-size: 18px;
        font-weight: 800;
      }

      .proof span {
        padding: 10px 14px;
        border-radius: 999px;
        background: #e6f0ff;
      }

      .visuals {
        position: relative;
        height: 520px;
      }

      .phone {
        position: absolute;
        overflow: hidden;
        border: 8px solid #11151b;
        border-radius: 42px;
        background: #ffffff;
        box-shadow: 0 28px 80px rgba(24, 33, 45, 0.2);
      }

      .phone img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
      }

      .phone.drive {
        right: 0;
        top: 18px;
        width: 284px;
        height: 618px;
        transform: rotate(4deg);
      }

      .phone.library {
        left: 18px;
        top: 86px;
        width: 248px;
        height: 540px;
        transform: rotate(-5deg);
      }

      .caption {
        position: absolute;
        right: 138px;
        bottom: 22px;
        padding: 13px 18px;
        border: 1px solid rgba(198, 212, 225, 0.82);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.92);
        color: #18212d;
        font-size: 20px;
        font-weight: 800;
        box-shadow: 0 18px 42px rgba(24, 33, 45, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <section>
        <div class="brand">
          <span class="mark" aria-hidden="true"><span></span></span>
          <span>Dashcam</span>
        </div>

        <h1>Your iPhone can keep the proof.</h1>
        <p>Record the road, keep maps visible, and save the clip when the drive goes wrong.</p>

        <div class="proof">
          <span>Local by default</span>
          <span>Maps in view</span>
          <span>Export by choice</span>
        </div>
      </section>

      <section class="visuals" aria-label="Dashcam product screenshots">
        <div class="phone library">
          <img src="/app-shots/local-only-library.png" alt="" />
        </div>
        <div class="phone drive">
          <img src="/app-shots/drive-mode-route.png" alt="" />
        </div>
        <div class="caption">Proof when it matters</div>
      </section>
    </main>
  </body>
</html>
